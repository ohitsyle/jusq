<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NUCash - Cashless Transaction System</title>
    <script>
      // Paint the correct theme before first render so new tabs never flash
      // white or the browser's default dark canvas. Mirrors ThemeContext
      // (localStorage key 'nucash-theme', dark by default).
      (function () {
        var dark = localStorage.getItem('nucash-theme') !== 'light';
        document.documentElement.dataset.theme = dark ? 'dark' : 'light';
        document.documentElement.style.colorScheme = dark ? 'dark' : 'light';
      })();
    </script>
    <style>
      /* Pre-React loading state: branded background + centered spinner.
         React replaces #root's content on mount. */
      html[data-theme='dark'] body { background: linear-gradient(135deg, #0F1227 0%, #181D40 100%); }
      html[data-theme='light'] body { background: linear-gradient(135deg, #E8F1FF 0%, #F0F7FF 100%); }
      body { margin: 0; min-height: 100vh; }
      #root:empty::after {
        content: '';
        position: fixed;
        top: 50%; left: 50%;
        width: 36px; height: 36px;
        margin: -18px 0 0 -18px;
        border-radius: 50%;
        border: 4px solid rgba(255, 212, 28, 0.25);
        border-top-color: #FFD41C;
        animation: nucashBoot 0.8s linear infinite;
      }
      html[data-theme='light'] #root:empty::after {
        border-color: rgba(59, 130, 246, 0.25);
        border-top-color: #3B82F6;
      }
      @keyframes nucashBoot { to { transform: rotate(360deg); } }
    </style>
    <script type="module" crossorigin src="/app-index-C4fDN24X.js"></script>
    <link rel="stylesheet" crossorigin href="/asset-index-B_wRQQO5.css">
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
